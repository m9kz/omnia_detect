name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  compose:
    name: Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose -f docker-compose.yml config

      - name: Validate deployment compose
        env:
          GHCR_OWNER: m9kz
          GHCR_REPOSITORY: omnia_detect
          IMAGE_TAG: ci
          FRONTEND_PORT: "8081"
          OMNIA_ENV_FILE: ../.env
          OMNIA_DATA_DIR: ./data
          OMNIA_MODELS_DIR: ./ml_models
          OMNIA_RUNS_DIR: ./runs
        run: docker compose -f deploy/docker-compose.blue-green.yml config
